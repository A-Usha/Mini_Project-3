{% extends "booking/base.html" %}
{% block content %}
<div class="col-md-4 mx-auto">
  <h3 class="text-center mb-3">Login</h3>

  {% if error %}
    <div class="alert alert-danger">
      {{ error }}
      <div class="mt-2">
        <small>New here? <a href="{% url 'register' %}">Register now</a></small>
      </div>
    </div>
  {% endif %}

  <form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-2">
      <input type="text" name="username" class="form-control" placeholder="Username" value="{{ request.POST.username }}">
    </div>
    <div class="mb-2">
      <input type="password" name="password" class="form-control" placeholder="Password">
    </div>
    <button class="btn btn-primary w-100">Login</button>
  </form>
</div>
{% endblock %}
